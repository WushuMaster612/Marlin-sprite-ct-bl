name: Build Marlin

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install PlatformIO
      run: pip install -U platformio

    - name: Clone Marlin 2.1.2.6
      run: git clone --depth 1 --branch 2.1.2.6 https://github.com/MarlinFirmware/Marlin.git

    - name: Clone matching Configurations
      run: git clone --depth 1 --branch release-2.1.2.6 https://github.com/MarlinFirmware/Configurations.git

    - name: Prepare configuration
      run: |
        # Start with official Ender-3 Pro + Creality 4.2.2 example
        cp -r "Configurations/config/examples/Creality/Ender-3 Pro/CrealityV422/." Marlin/Marlin/
        
        # Overwrite with your custom files
        cp Configuration.h Marlin/Marlin/
        cp Configuration_adv.h Marlin/Marlin/
        cp _Bootscreen.h Marlin/Marlin/ 2>/dev/null || true
        cp _Statusscreen.h Marlin/Marlin/ 2>/dev/null || true

    - name: Build firmware
      working-directory: Marlin
      run: pio run -e STM32F103RE_creality

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: Marlin/.pio/build/STM32F103RE_creality/*.bin
